<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252530"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <!-- Green accent gradient -->
    <linearGradient id="green" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#a0d4a0"/>
      <stop offset="100%" stop-color="#6ba06b"/>
    </linearGradient>
    <!-- Subtle inner shadow -->
    <filter id="innerglow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feOffset dx="0" dy="4"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#7eb77f" flood-opacity="0.08"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Page shadow -->
    <filter id="pageshadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Pen glow -->
    <filter id="penglow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#7eb77f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- macOS-style squircle background -->
  <rect x="40" y="40" width="944" height="944" rx="210" ry="210" fill="url(#bg)" filter="url(#innerglow)"/>

  <!-- Subtle border -->
  <rect x="40" y="40" width="944" height="944" rx="210" ry="210" fill="none" stroke="#3a3a48" stroke-width="1.5"/>

  <!-- Page/document (back, slightly offset) -->
  <rect x="290" y="195" width="470" height="600" rx="20" ry="20" fill="#2a2a38" filter="url(#pageshadow)"/>

  <!-- Page/document (front) -->
  <rect x="265" y="175" width="470" height="600" rx="20" ry="20" fill="#32323e"/>
  <rect x="265" y="175" width="470" height="600" rx="20" ry="20" fill="none" stroke="#3e3e4c" stroke-width="1"/>

  <!-- Markdown heading line: # -->
  <rect x="315" y="240" width="24" height="4" rx="2" fill="#7eb77f" opacity="0.9"/>
  <rect x="348" y="240" width="180" height="4" rx="2" fill="#8a8a9a" opacity="0.6"/>

  <!-- Body text lines -->
  <rect x="315" y="280" width="360" height="3" rx="1.5" fill="#55555f" opacity="0.5"/>
  <rect x="315" y="300" width="320" height="3" rx="1.5" fill="#55555f" opacity="0.5"/>
  <rect x="315" y="320" width="340" height="3" rx="1.5" fill="#55555f" opacity="0.5"/>
  <rect x="315" y="340" width="280" height="3" rx="1.5" fill="#55555f" opacity="0.4"/>

  <!-- Markdown heading line: ## -->
  <rect x="315" y="385" width="18" height="4" rx="2" fill="#7eb77f" opacity="0.7"/>
  <rect x="338" y="385" width="18" height="4" rx="2" fill="#7eb77f" opacity="0.7"/>
  <rect x="368" y="385" width="140" height="4" rx="2" fill="#8a8a9a" opacity="0.5"/>

  <!-- More body text -->
  <rect x="315" y="425" width="350" height="3" rx="1.5" fill="#55555f" opacity="0.5"/>
  <rect x="315" y="445" width="300" height="3" rx="1.5" fill="#55555f" opacity="0.5"/>
  <rect x="315" y="465" width="330" height="3" rx="1.5" fill="#55555f" opacity="0.5"/>

  <!-- Blockquote accent -->
  <rect x="315" y="510" width="3" height="45" rx="1.5" fill="#7eb77f" opacity="0.6"/>
  <rect x="330" y="515" width="280" height="3" rx="1.5" fill="#55555f" opacity="0.4"/>
  <rect x="330" y="535" width="240" height="3" rx="1.5" fill="#55555f" opacity="0.4"/>

  <!-- Bold text hint -->
  <rect x="315" y="590" width="60" height="3" rx="1.5" fill="#8a8a9a" opacity="0.7"/>
  <rect x="385" y="590" width="200" height="3" rx="1.5" fill="#55555f" opacity="0.5"/>

  <!-- Fountain pen / nib - positioned at bottom-right of page -->
  <g transform="translate(560, 620) rotate(-45)" filter="url(#penglow)">
    <!-- Pen barrel -->
    <rect x="0" y="-14" width="220" height="28" rx="6" fill="#3a3a48"/>
    <rect x="0" y="-14" width="220" height="28" rx="6" fill="none" stroke="#4a4a58" stroke-width="1"/>
    <!-- Grip section -->
    <rect x="-30" y="-11" width="35" height="22" rx="4" fill="#444450"/>
    <!-- Band detail -->
    <rect x="40" y="-14" width="4" height="28" rx="1" fill="url(#green)" opacity="0.8"/>
    <rect x="50" y="-14" width="2" height="28" rx="1" fill="url(#green)" opacity="0.4"/>
    <!-- Clip -->
    <rect x="80" y="-18" width="80" height="4" rx="2" fill="#4a4a58"/>
    <!-- Nib -->
    <polygon points="-30,-8 -30,8 -75,0" fill="url(#green)"/>
    <!-- Nib slit -->
    <line x1="-32" y1="0" x2="-70" y2="0" stroke="#252530" stroke-width="1.5"/>
    <!-- Nib tip -->
    <circle cx="-73" cy="0" r="2" fill="#c8e6c8"/>
  </g>

  <!-- Subtle "AI sparkle" dots near the pen -->
  <circle cx="690" cy="750" r="4" fill="#7eb77f" opacity="0.7"/>
  <circle cx="720" cy="770" r="2.5" fill="#7eb77f" opacity="0.5"/>
  <circle cx="700" cy="790" r="3" fill="#7eb77f" opacity="0.4"/>
</svg>
